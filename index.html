<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to ASCII</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Potatofel ASCII renderer</p>
      <h1>Генератор текстового Васи 👀(ASCII)</h1>
      <p class="subtitle">
        Загрузи изображение, а браузер превратит его в рисунок из символов.
      </p>

      <label class="upload-button">
        <input id="imageInput" type="file" accept="image/*">
        Загрузить картинку
      </label>
    </section>

    <section class="controls-card" aria-label="Настройки ASCII рендера">
      <div class="control">
        <label for="platformSelect">
          Куда отправлять
          <span id="platformValue">Discord</span>
        </label>
        <select id="platformSelect">
          <option value="discord" selected>Discord</option>
          <option value="steam">Steam</option>
          <option value="plain">Просто текст</option>
        </select>
      </div>

      <div class="control">
        <label for="widthRange">
          Детализация
          <span id="widthValue">80</span>
        </label>
        <input id="widthRange" type="range" min="30" max="140" value="80" step="2">
      </div>

      <div class="control">
        <label for="aspectRange">
          Высота
          <span id="aspectValue">50%</span>
        </label>
        <input id="aspectRange" type="range" min="35" max="85" value="50" step="1">
      </div>

      <div class="control">
        <label for="contrastRange">
          Контраст
          <span id="contrastValue">100%</span>
        </label>
        <input id="contrastRange" type="range" min="50" max="180" value="100" step="5">
      </div>

      <div class="control">
        <label for="brightnessRange">
          Яркость
          <span id="brightnessValue">0</span>
        </label>
        <input id="brightnessRange" type="range" min="-80" max="80" value="0" step="5">
      </div>

      <div class="control">
        <label for="gammaRange">
          Гамма
          <span id="gammaValue">1.00</span>
        </label>
        <input id="gammaRange" type="range" min="50" max="220" value="100" step="5">
      </div>

      <label class="toggle">
        <input id="invertToggle" type="checkbox">
        Инвертировать символы
      </label>

      <label class="toggle">
        <input id="solidCharsToggle" type="checkbox" checked>
        Без пустых краёв
      </label>

      <label class="toggle">
        <input id="brailleToggle" type="checkbox">
        Использовать Braille Pattern
      </label>

      <label class="toggle">
        <input id="codeWrapToggle" type="checkbox" checked>
        Моноширинная обёртка
      </label>
    </section>

    <section class="preview-card">
      <div class="preview-header">
        <div>
          <span>ASCII Preview</span>
          <small id="exportHint">Копируй через кнопку, чтобы сохранить моноширинный формат.</small>
        </div>
        <button id="copyButton" type="button" disabled>Скопировать для Discord</button>
      </div>
      <pre id="asciiOutput" aria-live="polite">Выбери картинку, чтобы увидеть ASCII-арт.</pre>
    </section>
  </main>
</body>
</html>
